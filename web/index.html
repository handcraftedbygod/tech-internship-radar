<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EU Tech Internship Radar</title>

  <link rel="alternate" type="application/rss+xml" title="Tech Internship Radar" href="feed.xml" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <script>
    (function () {
      document.documentElement.dataset.theme = localStorage.getItem("theme") || "dark";
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div>
      <h1>EU Tech Internship Radar</h1>
      <p>Internship &amp; working-student listings across European tech hubs, refreshed daily.</p>
      <p id="last-updated"></p>
    </div>
    <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme" title="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" />
      </svg>
    </button>
  </header>

  <div class="controls">
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7" />
        <path d="m20 20-3.2-3.2" />
      </svg>
      <input id="search" type="search" placeholder="Search title or company…" />
    </div>
    <div id="role-chips" class="chip-row" role="group" aria-label="Filter by role"></div>
    <div id="hub-chips" class="chip-row" role="group" aria-label="Filter by hub"></div>
    <button id="remote-toggle" type="button" class="chip" aria-pressed="false">Remote only</button>
    <button id="saved-toggle" type="button" class="chip" aria-pressed="false">Saved only</button>
    <span id="count"></span>
  </div>

  <table id="jobs-table">
    <thead>
      <tr>
        <th></th>
        <th data-key="location">Hub</th>
        <th data-key="company">Company</th>
        <th data-key="title">Role</th>
        <th data-key="postedDate">Posted</th>
        <th>Salary</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <p id="empty-state" hidden>No listings match your filters.</p>

  <button id="load-more" type="button" hidden></button>

  <script src="app.js"></script>
</body>
</html>
